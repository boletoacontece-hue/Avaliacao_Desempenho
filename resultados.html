<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#2B5C2B">
<title>Resultados · Acontece</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="estilo.css">
</head>
<body>
<div class="topo">
  <div class="sel"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M4 19V9M10 19V5M16 19v-7M22 19H2"/></svg></div>
  <div class="marca">Painel de Resultados<small>Financeiro · Acontece</small></div>
  <div class="dir"><span id="quem"></span><button class="sair" id="btnSair">Sair</button></div>
</div>

<div class="wrap wrap-lg">
  <div id="msg"></div>
  <div id="conteudo"><p class="muted">Carregando…</p></div>
  <p class="rodape">As observações aparecem sem autor e em ordem aleatória. O sistema não guarda quem escreveu o quê.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="db-aval.js"></script>
<script>
const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
if (!Sessao.logado()) location.href = "index.html";
const D = Sessao.dados();
$("#quem").innerHTML = "<b>" + D.nome.split(" ")[0] + "</b>";
if (!D.eh_admin){ $("#conteudo").innerHTML = `<div class="msg err">Acesso restrito ao administrador.</div>`; }

const NOMES_DISC = { D:"Dominância", I:"Influência", S:"Estabilidade", C:"Conformidade" };

function corNota(v){ if(v==null) return "var(--tinta-suave)"; if(v>=8) return "var(--ok)"; if(v>=6) return "var(--verde-esc)"; if(v>=4) return "var(--dourado)"; return "var(--erro)"; }

function render(dados){
  const R = dados.resultados || [], A = dados.andamento || {concluidos:[],pendentes:[]};
  let h = `<p class="eyebrow">Rodada ${esc(dados.rodada)} · ${dados.aberta?"aberta":"fechada"}</p>
           <h1>Resultados da avaliação</h1>`;

  // Andamento
  h += `<div class="card"><h3>Andamento</h3>
    <p class="muted">${A.concluidos.length} concluíram · ${A.pendentes.length} pendentes
    ${A.pendentes.length?"— <b>faltam:</b> "+A.pendentes.map(esc).join(", "):""}</p></div>`;

  // Tabela de médias
  h += `<h2>Médias por colaborador (1–10)</h2>
    <div class="card" style="overflow-x:auto"><table><thead><tr>
    <th>Colaborador</th><th class="num">Compor­tamento</th><th class="num">Técnica</th>
    <th class="num">Comuni­cação</th><th class="num">Relacio­namento</th><th class="num">Proati­vidade</th>
    <th class="num">Geral</th><th class="num">Avals</th></tr></thead><tbody>`;
  if (!R.length) h += `<tr><td colspan="8" class="muted">Sem dados ainda.</td></tr>`;
  R.forEach(p => {
    const cel = v => `<td class="num" style="color:${corNota(v)}">${v??"—"}</td>`;
    const aviso = p.n>0 && p.n<3 ? `<span class="aviso-n" title="Poucas avaliações: anonimato mais frágil">n baixo</span>` : "";
    h += `<tr><td>${esc(p.nome)}${aviso}</td>${cel(p.comportamento)}${cel(p.tecnica)}${cel(p.comunicacao)}${cel(p.relacionamento)}${cel(p.proatividade)}<td class="num geral">${p.geral??"—"}</td><td class="num">${p.n}</td></tr>`;
  });
  h += `</tbody></table></div>`;

  // Observações por pessoa (accordion)
  h += `<h2>Observações (anônimas)</h2>`;
  R.filter(p => (p.observacoes||[]).length).forEach(p => {
    h += `<details class="card"><summary style="cursor:pointer;font-weight:600">${esc(p.nome)} · ${p.observacoes.length} observação(ões)</summary>
      <div style="margin-top:10px">` +
      p.observacoes.map(o => `<p style="border-left:3px solid var(--verde-claro);padding-left:12px;margin:8px 0;color:#33482f">${esc(o)}</p>`).join("") +
      `</div></details>`;
  });
  if (!R.some(p => (p.observacoes||[]).length)) h += `<p class="muted">Nenhuma observação registrada ainda.</p>`;

  // DISC
  h += `<h2>Perfis DISC (autoavaliação)</h2>`;
  if (!(dados.disc||[]).length) h += `<p class="muted">Ninguém respondeu o DISC ainda.</p>`;
  (dados.disc||[]).forEach(d => {
    h += `<div class="card"><h3>${esc(d.nome)}</h3>`;
    ["D","I","S","C"].forEach(f => {
      const v = d.perfil[f];
      h += `<div class="disc-bar"><span class="lab">${NOMES_DISC[f]}</span>
        <span class="track"><i class="d-${f}" style="width:${v}%"></i></span><span class="val">${v}</span></div>`;
    });
    h += `</div>`;
  });

  // Gestão
  h += `<h2>Gestão</h2>
  <div class="card"><h3>Cadastrar colaborador</h3>
    <div class="campo"><label>Nome</label><input type="text" id="gNome" placeholder="Nome completo"></div>
    <div class="campo"><label>Login</label><input type="text" id="gLogin" placeholder="ex.: joao.souza" autocapitalize="none"></div>
    <div class="campo"><label>Senha inicial</label><input type="text" id="gSenha" placeholder="senha que você entrega à pessoa"></div>
    <label style="font-weight:500"><input type="checkbox" id="gAdmin" style="width:auto"> Também é administrador</label>
    <div style="margin-top:12px"><button class="btn" id="btnAdd">Cadastrar</button></div>
  </div>
  <div class="card"><h3>Redefinir senha</h3>
    <div class="campo"><label>Login da pessoa</label><input type="text" id="rLogin" autocapitalize="none"></div>
    <div class="campo"><label>Nova senha</label><input type="text" id="rSenha"></div>
    <button class="btn btn-alt" id="btnReset">Redefinir</button>
  </div>
  <div class="card"><h3>Rodada</h3>
    <div class="campo"><label>Rodada ativa</label><input type="text" id="cRodada" value="${esc(dados.rodada)}"></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn ${dados.aberta?'':'btn-alt'}" id="btnAbrir">Deixar aberta</button>
      <button class="btn ${dados.aberta?'btn-alt':''}" id="btnFechar">Fechar rodada</button>
    </div>
    <p class="muted" style="margin-top:8px">Ao começar uma nova rodada, troque o nome (ex.: 2026-S2) e deixe aberta — o histórico anterior fica preservado.</p>
  </div>`;

  $("#conteudo").innerHTML = h;
  ligarGestao();
}

function ligarGestao(){
  const flash = (t,tipo) => { $("#msg").innerHTML = `<div class="msg ${tipo}">${t}</div>`; window.scrollTo({top:0,behavior:"smooth"}); };
  $("#btnAdd") && $("#btnAdd").addEventListener("click", async () => {
    const nome=$("#gNome").value.trim(), login=$("#gLogin").value.trim(), senha=$("#gSenha").value, adm=$("#gAdmin").checked;
    if(!nome||!login||!senha){ flash("Preencha nome, login e senha.","err"); return; }
    try{ await API.addPessoa(nome,login,senha,adm); flash("Colaborador cadastrado: "+nome,"ok"); carregar(); }
    catch(e){ flash(traduzErro(e),"err"); }
  });
  $("#btnReset") && $("#btnReset").addEventListener("click", async () => {
    const l=$("#rLogin").value.trim(), s=$("#rSenha").value;
    if(!l||!s){ flash("Informe login e nova senha.","err"); return; }
    try{ await API.resetSenha(l,s); flash("Senha redefinida.","ok"); }
    catch(e){ flash(traduzErro(e),"err"); }
  });
  $("#btnAbrir") && $("#btnAbrir").addEventListener("click", async () => {
    try{ await API.setRodada($("#cRodada").value.trim(), true); flash("Rodada aberta.","ok"); carregar(); }
    catch(e){ flash(traduzErro(e),"err"); }
  });
  $("#btnFechar") && $("#btnFechar").addEventListener("click", async () => {
    try{ await API.setRodada($("#cRodada").value.trim(), false); flash("Rodada fechada.","ok"); carregar(); }
    catch(e){ flash(traduzErro(e),"err"); }
  });
}

async function carregar(){
  try{ const d = await API.resultados(); render(d); }
  catch(e){ $("#conteudo").innerHTML = `<div class="msg err">${traduzErro(e)}</div>`; }
}

$("#btnSair").addEventListener("click", () => { Sessao.sair(); location.href="index.html"; });
if (D.eh_admin) carregar();
</script>
</body>
</html>
